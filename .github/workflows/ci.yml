name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  # ── API: RSpec ─────────────────────────────────────────────────
  api-tests:
    name: API — RSpec
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: memory_tunnel_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: api

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/memory_tunnel_test
      JWT_SECRET: test_secret

    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.6"
          bundler-cache: true
          working-directory: api

      - name: Set up DB
        run: bundle exec rails db:schema:load

      - name: Run RSpec
        run: bundle exec rspec --format progress --format RspecJunitFormatter --out /tmp/rspec.xml

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: rspec-results
          path: /tmp/rspec.xml
