name: TestFlight Beta

on:
  workflow_dispatch:
    inputs:
      changelog:
        description: "What changed in this build?"
        required: false
        default: "Bug fixes and improvements"

jobs:
  # ── iOS Build + TestFlight Upload ──────────────────────────────
  ios-beta:
    name: iOS — TestFlight
    runs-on: macos-14  # M1 runner, Xcode 15+

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: Import App Store Connect API key
        env:
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_KEY_CONTENT" | base64 --decode > ~/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Install Fastlane dependencies
        working-directory: ios
        run: bundle install --jobs 4 --retry 3

      - name: Build and upload to TestFlight
        working-directory: ios
        env:
          APPLE_ID:          ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID:     ${{ secrets.APPLE_TEAM_ID }}
          ITC_TEAM_ID:       ${{ secrets.ITC_TEAM_ID }}
          MATCH_GIT_URL:     ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD:    ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID:        ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:     ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT:   ${{ secrets.ASC_KEY_CONTENT }}
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "120"
        run: bundle exec fastlane beta

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ipa
          path: ios/build/MemoryTunnel.ipa
          retention-days: 30
