name: MemoryTunnel
options:
  bundleIdPrefix: com.memorytunnel
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""  # Set to your Team ID before archiving

targets:
  MemoryTunnel:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MemoryTunnel
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.memorytunnel.app
        INFOPLIST_FILE: MemoryTunnel/Info.plist
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        # App Groups for widget shared defaults
      configs:
        Debug:
          OTHER_SWIFT_FLAGS: "-DDEBUG"
    entitlements:
      path: MemoryTunnel/MemoryTunnel.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.memorytunnel.app
        aps-environment: development
    dependencies:
      - framework: Vision.framework
        weak: false
      - framework: UserNotifications.framework
        weak: false
    info:
      path: MemoryTunnel/Info.plist
      properties:
        CFBundleName: $(PRODUCT_NAME)
        CFBundleDisplayName: Memory Tunnel
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundlePackageType: APPL
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSPhotoLibraryUsageDescription: "Memory Tunnel needs access to your photos to send memories."
        NSCameraUsageDescription: "Memory Tunnel uses your camera to capture memories."
        NSContactsUsageDescription: "Memory Tunnel reads your contacts to detect birthdays."
        UIBackgroundModes:
          - remote-notification

  MemoryTunnelWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MemoryTunnelWidget
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.memorytunnel.app.widget
        INFOPLIST_FILE: MemoryTunnelWidget/Info.plist
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: MemoryTunnelWidget/MemoryTunnelWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.memorytunnel.app
    dependencies:
      - framework: WidgetKit.framework
        weak: false
      - framework: SwiftUI.framework
        weak: false
    info:
      path: MemoryTunnelWidget/Info.plist
      properties:
        CFBundleName: $(PRODUCT_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundlePackageType: XPC!
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
