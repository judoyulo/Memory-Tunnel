name: MemoryTunnel
options:
  bundleIdPrefix: com.memorytunnel
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""  # Set in Xcode Signing & Capabilities per target

targets:
  MemoryTunnel:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MemoryTunnel
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.memorytunnel.app
        INFOPLIST_FILE: MemoryTunnel/Info.plist
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # App Groups for widget shared defaults
      configs:
        Debug:
          OTHER_SWIFT_FLAGS: "-DDEBUG"
          API_BASE_URL: "http://192.168.1.244:3000"
    entitlements:
      path: MemoryTunnel/MemoryTunnel.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.memorytunnel.app
    dependencies:
      - sdk: Vision.framework
      - sdk: UserNotifications.framework

